<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvenBot OS — AI Inventory Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Constellation Background -->
  <canvas id="constellationCanvas"></canvas>

  <div class="os-canvas">

    <!-- Topbar (Minimalist) -->
    <header class="os-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </div>
        <span class="logo-text">InvenBot AI</span>
      </div>
      <div class="header-actions">
        <div class="status-pill glass-panel" id="serverStatus">
          <div class="status-dot inactive" id="serverDot"></div>
          <span id="serverStatusText">Connecting…</span>
        </div>
        <button class="icon-btn glass-panel hidden-mobile" id="toggleDashboardBtn" title="Toggle Dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="3" y1="9" x2="21" y2="9" />
            <line x1="9" y1="21" x2="9" y2="9" />
          </svg>
        </button>
        <button class="icon-btn glass-panel" id="clearChatBtn" title="Clear Chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
          </svg>
        </button>
        <!-- User pill + Signout -->
        <div class="user-pill glass-panel hidden-mobile" id="userPill">
          <div class="user-av" id="userAv">?</div>
          <span class="user-name" id="userName">User</span>
        </div>
        <button class="icon-btn glass-panel signout-btn" id="signoutBtn" title="Sign Out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Floating Dashboard (Hidden by default or toggled) -->
    <div class="floating-dashboard glass-panel" id="floatingDashboard">

      <!-- Section 1: Stats -->
      <div class="dash-section">
        <p class="dash-label">Stats</p>
        <div class="stat-row"><span>Items</span><strong id="statItems">—</strong></div>
        <div class="stat-row"><span>Available</span><strong id="statStockIn">—</strong></div>
        <div class="stat-row"><span>Sold</span><strong id="statSold">—</strong></div>
        <div class="dash-actions">
          <button class="neon-btn outline small" id="refreshStatsBtn">Sync</button>
          <button class="neon-btn outline small" id="exportBtn">Export DB</button>
        </div>
      </div>

      <div class="dash-divider"></div>

      <!-- Section 2: P&L Analysis -->
      <div class="dash-section">
        <p class="dash-label">Profit &amp; Loss</p>
        <div id="plContainer" class="pl-list">
          <span class="pl-loading">Loading...</span>
        </div>
        <div class="dash-divider" style="margin: 10px 0 8px"></div>
        <div class="stat-row profit-row"><span>Total Profit</span><strong id="statProfit">—</strong></div>
        <div class="stat-row loss-row"><span>Total Loss</span><strong id="statLoss">—</strong></div>
      </div>

      <div class="dash-divider"></div>

      <!-- Section 3: Alerts -->
      <div class="dash-section" id="lowStockPanel">
        <div class="dash-header-row">
          <p class="dash-label">Alerts</p>
          <span class="pulse-dot"></span>
        </div>
        <div id="lowStockContainer" class="alert-list">
          <span>Fetching...</span>
        </div>
      </div>
    </div>

    <!-- Centered Feed -->
    <main class="feed-container" id="chatArea">
      <div class="welcome-hero" id="welcomeScreen">
        <div class="hero-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polygon points="12 2 2 7 12 12 22 7 12 2" />
            <polyline points="2 17 12 22 22 17" />
            <polyline points="2 12 12 17 22 12" />
          </svg>
        </div>
        <h1>Command your Inventory</h1>
        <p>A smart holographic OS for tracking your goods, sales, and analytics.</p>
        <div class="hero-chips">
          <button class="chip" data-query="show all inventory">Inventory</button>
          <button class="chip" data-query="sales from 2026-04-01 to 2026-04-15">Recent Sales</button>
          <button class="chip" data-query="show profit for all items">Calculations</button>
        </div>
      </div>

      <div class="messages-stack" id="messagesContainer"></div>

      <!-- Spacing div so last message isn't hidden behind the massive omnibar -->
      <div class="feed-spacer"></div>
    </main>

    <!-- Floating Omnibar -->
    <footer class="omnibar-wrapper">
      <div class="quick-commands-bar">
        <span>Try:</span>
        <button class="qc-btn" data-query="add 50 laptops at cost 500 sell 800">add 50 laptops...</button>
        <button class="qc-btn" data-query="sell 5 mice">sell 5 mice</button>
        <button class="qc-btn" data-query="delete headphones">delete headphones</button>
        <button class="qc-btn" data-query="help">help</button>
      </div>
      <div class="omnibar glass-panel">
        <textarea id="userInput" class="omni-input" placeholder="Type a command..." rows="1"
          autocomplete="off"></textarea>
        <button class="omni-send" id="sendBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="app.js"></script>

  <!-- Constellation Background Script -->
  <script>
    (function () {
      const canvas = document.getElementById('constellationCanvas');
      const ctx = canvas.getContext('2d');

      const STAR_COLOR   = 'rgba(0, 242, 254, ';
      const LINE_COLOR   = 'rgba(0, 242, 254, ';
      const STAR_COUNT   = 80;
      const MAX_DIST     = 115;   // max px distance to draw a line
      const SPEED        = 0.42;  // base movement speed

      let W, H, stars = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function rand(min, max) { return Math.random() * (max - min) + min; }

      function createStar() {
        return {
          x:  rand(0, W),
          y:  rand(0, H),
          r:  rand(1.2, 2.8),
          vx: rand(-SPEED, SPEED),
          vy: rand(-SPEED, SPEED),
          opacity: rand(0.5, 1.0)
        };
      }

      function init() {
        resize();
        stars = Array.from({ length: STAR_COUNT }, createStar);
      }

      function drawStar(s) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = STAR_COLOR + s.opacity + ')';
        ctx.shadowColor = '#00f2fe';
        ctx.shadowBlur  = 8;
        ctx.fill();
        ctx.shadowBlur  = 0;
      }

      function drawLines() {
        for (let i = 0; i < stars.length; i++) {
          for (let j = i + 1; j < stars.length; j++) {
            const dx   = stars[i].x - stars[j].x;
            const dy   = stars[i].y - stars[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < MAX_DIST) {
              const alpha = (1 - dist / MAX_DIST) * 0.35;
              ctx.beginPath();
              ctx.moveTo(stars[i].x, stars[i].y);
              ctx.lineTo(stars[j].x, stars[j].y);
              ctx.strokeStyle = LINE_COLOR + alpha + ')';
              ctx.lineWidth   = 0.8;
              ctx.stroke();
            }
          }
        }
      }

      function update() {
        stars.forEach(s => {
          s.x += s.vx;
          s.y += s.vy;
          // Wrap around edges
          if (s.x < -5)  s.x = W + 5;
          if (s.x > W+5) s.x = -5;
          if (s.y < -5)  s.y = H + 5;
          if (s.y > H+5) s.y = -5;
        });
      }

      function loop() {
        ctx.clearRect(0, 0, W, H);
        // Subtle dark tint so stars pop
        ctx.fillStyle = 'rgba(5, 5, 16, 0.18)';
        ctx.fillRect(0, 0, W, H);
        drawLines();
        stars.forEach(drawStar);
        update();
        requestAnimationFrame(loop);
      }

      window.addEventListener('resize', () => { resize(); });
      init();
      loop();
    })();
  </script>
</body>

</html>
